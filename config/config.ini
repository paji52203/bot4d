[ai_providers]
provider = openrouter
lm_studio_base_url = http://localhost:1234/v1
lm_studio_model =
lm_studio_streaming = false
openrouter_base_url = https://openrouter.ai/api/v1
openrouter_base_model = deepseek/deepseek-v3.2
openrouter_fallback_model = deepseek/deepseek-r1:free
google_studio_model = gemini-2.5-flash
blockrun_base_url = https://blockrun.ai/api
blockrun_model = deepseek/deepseek-reasoner

[general]
crypto_pair = BTC/USDT:USDT
timeframe = 15m
candle_limit = 999
ai_chart_candle_limit = 125
discord_bot = false
include_coin_description = false

[debug]
save_chart_images = false
chart_save_path = chart_images
logger_debug = false

[directories]
log_dir = logs
data_dir = data

[rag]
update_interval_hours = 4
categories_update_interval_hours = 168
coingecko_update_interval_hours = 24
defillama_update_interval_hours = 0.25
coingecko_global_api_url = https://api.coingecko.com/api/v3/global
news_limit = 5
article_max_tokens = 500
news_filter_sources = true
news_allowed_feeds = seekingalpha,invezz,coinpaper,cryptopotato

[exchanges]
supported = bybit
market_refresh_hours = 24

[bybit_futures]
default_leverage = 10
max_leverage = 100
min_confidence_to_trade = 55

[demo_trading]
demo_quote_capital = 69
transaction_fee_percent = 0.0055

[cooldowns]
file_message_expiry = 168

[model_config]
temperature = 0.7
top_p = 0.9
top_k = 40
max_tokens = 8768
google_temperature = 1.0
google_top_p = 0.95
google_top_k = 64
google_max_tokens = 8768
google_thinking_level = medium
google_code_execution = false

[dashboard]
enabled = true
host = 0.0.0.0
port = 8000
enable_cors = false
cors_origins = *

[risk_management]
default_position_size = 0.30
default_stop_loss_pct = 0.02
default_take_profit_pct = 0.04
